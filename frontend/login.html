<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background:#FAF3E0;
    }
    h1, h2 {
      font-family: 'Manrope', sans-serif;
    }
    .btn {
      background: #5f5e5e;
      color: white;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col">

<header class="flex justify-center items-center px-6 py-6 mt-4 max-w-5xl mx-auto w-full">
  <h1 class="text-2xl font-extrabold text-center w-full">BrandFluence</h1>
</header>

<!-- MAIN -->
<main class="flex-grow flex items-center justify-center px-6">
  <div class="w-full max-w-md">

    <!-- TITLE -->
    <div class="mb-10">
      <h2 class="text-3xl font-extrabold leading-tight">
        Welcome back 👋
      </h2>
      <p class="text-gray-500 text-sm mt-2">
        Login to continue your journey.
      </p>
    </div>

    <!-- FORM -->
    <div class="space-y-4">

      <input type="email" placeholder="Email Address"
        class="w-full p-3 rounded bg-gray-100 focus:outline-none">

      <input type="password" placeholder="Password"
        class="w-full p-3 rounded bg-gray-100 focus:outline-none">

      <!-- FORGOT PASSWORD -->
      <div class="text-right text-sm">
        <a href="#" class="text-gray-500">Forgot Password?</a>
      </div>

      <button class="btn w-full p-3 rounded font-bold">
        Login
      </button>

      <!-- DIVIDER -->
      <div class="flex items-center gap-2 text-xs text-gray-400 my-4">
        <hr class="flex-grow"> OR <hr class="flex-grow">
      </div>

    </div>

    <!-- FOOTER -->
    <p class="text-center text-sm text-gray-500 mt-8">
      Don’t have an account?
      <a href="./regsiter.html" class="font-bold text-black">Sign up</a>
    </p>

  </div>
</main>

</body>
</html>
